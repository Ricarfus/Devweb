<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gametrackk - Sign Up</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <h1 class="auth-title">Create an account</h1>
            <p class="auth-subtitle">Start rating games.</p>
            <form id="signup-form">
                <div class="input-group">
                    <label for="signup-username">USERNAME <span class="required">*</span></label>
                    <input type="text" id="signup-username" required>
                </div>
                <div class="input-group">
                    <label for="signup-email">EMAIL <span class="required">*</span></label>
                    <input type="email" id="signup-email" required>
                </div>
                <div class="input-group">
                    <label for="signup-password">PASSWORD <span class="required">*</span></label>
                    <input type="password" id="signup-password" required>
                </div>
                <div class="error-text" id="signup-error"></div>
                <button type="submit" class="btn-primary">Sign Up</button>
            </form>
            <div class="auth-switch">
                <span>Have an account?</span> <a href="login.html">Log in</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
