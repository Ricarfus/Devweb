<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gametrackk - Login</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box" id="login-box">
            <h1 class="auth-title">Welcome back!</h1>
            <p class="auth-subtitle">We're so excited to see you again!</p>
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">EMAIL OR USERNAME <span class="required">*</span></label>
                    <input type="text" id="login-email" required>
                </div>
                <div class="input-group">
                    <label for="login-password">PASSWORD <span class="required">*</span></label>
                    <input type="password" id="login-password" required>
                </div>
                <div class="error-text" id="login-error"></div>
                <button type="submit" class="btn-primary">Log In</button>
            </form>
            <div class="auth-switch">
                <span>Need an account?</span> <a href="#" id="show-register">Register</a>
            </div>
        </div>

        <div class="auth-box hidden" id="register-box">
            <h1 class="auth-title">Create an account</h1>
            <form id="register-form">
                <div class="input-group">
                    <label for="reg-email">EMAIL <span class="required">*</span></label>
                    <input type="email" id="reg-email" required>
                </div>
                <div class="input-group">
                    <label for="reg-username">USERNAME <span class="required">*</span></label>
                    <input type="text" id="reg-username" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">PASSWORD <span class="required">*</span></label>
                    <input type="password" id="reg-password" required>
                </div>
                <div class="input-group">
                    <label for="reg-confirm-password">CONFIRM PASSWORD <span class="required">*</span></label>
                    <input type="password" id="reg-confirm-password" required>
                </div>
                <div class="error-text" id="register-error"></div>
                <button type="submit" class="btn-primary">Continue</button>
            </form>
            <div class="auth-switch">
                <a href="#" id="show-login">Already have an account?</a>
            </div>
        </div>
    </div>
    <script src="js/auth.js"></script>
</body>
</html>
