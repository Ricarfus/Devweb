<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gametrackk - Login</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div class="auth-box">
            <h1 class="auth-title">Welcome back!</h1>
            <p class="auth-subtitle">Log in to keep rating.</p>
            <form id="login-form">
                <div class="input-group">
                    <label for="login-email">EMAIL <span class="required">*</span></label>
                    <input type="email" id="login-email" required>
                </div>
                <div class="input-group">
                    <label for="login-password">PASSWORD <span class="required">*</span></label>
                    <input type="password" id="login-password" required>
                </div>
                <div class="error-text" id="login-error"></div>
                <button type="submit" class="btn-primary">Log In</button>
            </form>
            <div class="auth-switch">
                <span>Need an account?</span> <a href="signup.html">Sign up</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
